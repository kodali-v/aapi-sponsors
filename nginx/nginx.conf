upstream sponsors_backend { server backend:4000; }
upstream sponsors_frontend { server frontend:80; }

server {
    listen 80;
    server_name _;
    client_max_body_size 5M;
    location /api/ { proxy_pass http://sponsors_backend; proxy_set_header Host $host; }
    location / { proxy_pass http://sponsors_frontend; proxy_set_header Host $host; }
}
